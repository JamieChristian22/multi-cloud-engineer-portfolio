
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-eu-central
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-eu-central
  template:
    metadata:
      labels:
        app: backend-eu-central
    spec:
      containers:
        - name: backend-eu-central
          image: ghcr.io/jamiechristian22/model-backend:1.0.0
          env:
            - name: REGION
              value: "eu-central"
            - name: PORT
              value: "9103"
          ports:
            - containerPort: 9103
          readinessProbe:
            httpGet:
              path: /health
              port: 9103
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-eu-central
spec:
  selector:
    app: backend-eu-central
  ports:
    - port: 9103
      targetPort: 9103
