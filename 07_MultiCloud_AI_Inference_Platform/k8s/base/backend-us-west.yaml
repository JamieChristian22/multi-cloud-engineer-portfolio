
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-us-west
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-us-west
  template:
    metadata:
      labels:
        app: backend-us-west
    spec:
      containers:
        - name: backend-us-west
          image: ghcr.io/jamiechristian22/model-backend:1.0.0
          env:
            - name: REGION
              value: "us-west"
            - name: PORT
              value: "9102"
          ports:
            - containerPort: 9102
          readinessProbe:
            httpGet:
              path: /health
              port: 9102
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-us-west
spec:
  selector:
    app: backend-us-west
  ports:
    - port: 9102
      targetPort: 9102
