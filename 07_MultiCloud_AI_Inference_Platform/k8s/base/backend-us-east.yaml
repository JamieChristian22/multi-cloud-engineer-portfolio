
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-us-east
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-us-east
  template:
    metadata:
      labels:
        app: backend-us-east
    spec:
      containers:
        - name: backend-us-east
          image: ghcr.io/jamiechristian22/model-backend:1.0.0
          env:
            - name: REGION
              value: "us-east"
            - name: PORT
              value: "9101"
          ports:
            - containerPort: 9101
          readinessProbe:
            httpGet:
              path: /health
              port: 9101
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-us-east
spec:
  selector:
    app: backend-us-east
  ports:
    - port: 9101
      targetPort: 9101
